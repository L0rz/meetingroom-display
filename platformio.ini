; PlatformIO Configuration
; Elecrow CrowPanel 4.2" E-Paper (SSD1683, 400x300) mit ESP32-S3
; Flashen: pio run --target upload
; Serieller Monitor: pio device monitor

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; USB CDC für Serial Output (ESP32-S3)
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=1

lib_deps =
    ; E-Paper Display Bibliothek (SSD1683 wird unterstützt)
    zinggjm/GxEPD2 @ ^1.6.0
    ; JSON Parsing
    bblanchon/ArduinoJson @ ^7.2.0
    ; Adafruit GFX (Fonts)
    adafruit/Adafruit GFX Library @ ^1.11.9
    ; Adafruit BusIO (GFX Dependency)
    adafruit/Adafruit BusIO @ ^1.16.1
